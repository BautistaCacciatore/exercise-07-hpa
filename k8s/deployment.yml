apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-registry
  labels:
    app: node-registry
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-registry
  template:
    metadata:
      labels:
        app: node-registry
    spec:
      containers:
        - name: node-registry
          image: node-registry:latest   
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: node-registry-secret
                  key: DATABASE_URL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3